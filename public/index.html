<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieStream DB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #11111a;
    --surface2: #1a1a28;
    --border: #2a2a40;
    --accent: #e8ff00;
    --accent2: #ff6b35;
    --accent3: #7c3aed;
    --text: #e8e8f0;
    --text-dim: #6b6b8a;
    --danger: #ff4444;
    --success: #00ff88;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(232,255,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(232,255,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 56px;
  }
  .logo { font-family: var(--mono); font-size: 0.75rem; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; white-space: nowrap; }
  .logo span { color: var(--text-dim); }
  nav { display: flex; gap: 0.25rem; flex: 1; }
  nav button { background: none; border: none; color: var(--text-dim); font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.05em; padding: 0.4rem 0.9rem; cursor: pointer; border-radius: 4px; transition: all 0.15s; text-transform: uppercase; }
  nav button:hover { color: var(--text); background: var(--surface2); }
  nav button.active { color: var(--accent); background: rgba(232,255,0,0.08); }
  .db-badge { font-family: var(--mono); font-size: 0.6rem; color: var(--success); border: 1px solid var(--success); padding: 0.2rem 0.5rem; border-radius: 2px; margin-left: auto; }
  .db-badge.error { color: var(--danger); border-color: var(--danger); }
  main { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 2rem; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; gap: 1rem; }
  .page-title { font-size: 2rem; font-weight: 800; line-height: 1; }
  .page-title span { display: block; font-size: 0.7rem; font-family: var(--mono); color: var(--text-dim); font-weight: 400; margin-bottom: 0.4rem; letter-spacing: 0.1em; }
  .controls { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
  .search-box { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 0.75rem; padding: 0.6rem 1rem; border-radius: 4px; outline: none; transition: border-color 0.2s; }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-dim); }
  select.filter-select { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 0.75rem; padding: 0.6rem 1rem; border-radius: 4px; outline: none; cursor: pointer; }
  .btn { font-family: var(--mono); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em; padding: 0.6rem 1.2rem; border-radius: 4px; border: none; cursor: pointer; transition: all 0.15s; text-transform: uppercase; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #fff; transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid transparent; }
  .btn-danger:hover { background: rgba(255,68,68,0.1); border-color: var(--danger); }
  .btn-edit { background: transparent; color: var(--accent2); border: 1px solid transparent; }
  .btn-edit:hover { background: rgba(255,107,53,0.1); border-color: var(--accent2); }
  .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.65rem; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1.25rem; transition: border-color 0.2s, transform 0.2s; animation: fadeIn 0.3s ease forwards; }
  .card:hover { border-color: rgba(232,255,0,0.3); transform: translateY(-2px); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.75rem; }
  .card-title { font-size: 1rem; font-weight: 600; line-height: 1.2; }
  .card-year { font-family: var(--mono); font-size: 0.7rem; color: var(--text-dim); white-space: nowrap; }
  .tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin: 0.5rem 0; }
  .tag { font-family: var(--mono); font-size: 0.6rem; padding: 0.2rem 0.5rem; border-radius: 2px; letter-spacing: 0.04em; }
  .tag.genre { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
  .card-meta { font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim); margin: 0.5rem 0; line-height: 1.6; }
  .card-meta strong { color: var(--text); }
  .card-actions { display: flex; gap: 0.35rem; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
  .cast-list { font-family: var(--mono); font-size: 0.63rem; color: var(--text-dim); line-height: 1.8; }
  .cast-list span { color: var(--text); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem; animation: overlayIn 0.2s ease; }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 2rem; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; animation: modalIn 0.25s ease; }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .modal-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
  .modal-title::before { content: ''; display: block; width: 4px; height: 1.4rem; background: var(--accent); border-radius: 2px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
  input, textarea, select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 0.8rem; padding: 0.6rem 0.8rem; border-radius: 4px; outline: none; transition: border-color 0.2s; width: 100%; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  .form-hint { font-family: var(--mono); font-size: 0.6rem; color: var(--text-dim); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .empty { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty p { font-family: var(--mono); font-size: 0.8rem; }
  .stats-bar { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; padding: 1rem 1.25rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; gap: 0.2rem; }
  .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--accent); line-height: 1; }
  .stat-label { font-family: var(--mono); font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .interaction-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1rem 1.25rem; display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 1rem; animation: fadeIn 0.3s ease forwards; transition: border-color 0.2s; }
  .interaction-card:hover { border-color: rgba(232,255,0,0.2); }
  .interaction-type { font-family: var(--mono); font-size: 0.6rem; padding: 0.3rem 0.6rem; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  .type-view { background: rgba(0,255,136,0.1); color: var(--success); border: 1px solid rgba(0,255,136,0.3); }
  .type-rating { background: rgba(232,255,0,0.1); color: var(--accent); border: 1px solid rgba(232,255,0,0.3); }
  .interaction-info { overflow: hidden; }
  .interaction-movie { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .interaction-user { font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim); margin-top: 0.2rem; }
  .rating-badge { display: inline-block; background: rgba(232,255,0,0.1); color: var(--accent); border: 1px solid rgba(232,255,0,0.3); font-family: var(--mono); font-size: 0.65rem; padding: 0.15rem 0.4rem; border-radius: 2px; }
  .interaction-date { font-family: var(--mono); font-size: 0.63rem; color: var(--text-dim); text-align: right; }
  .interactions-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--surface); border: 1px solid var(--accent); color: var(--accent); font-family: var(--mono); font-size: 0.75rem; padding: 0.75rem 1.25rem; border-radius: 4px; z-index: 999; animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; letter-spacing: 0.04em; }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .page-header { flex-direction: column; }
    .interaction-card { grid-template-columns: auto 1fr; }
    .interaction-date { display: none; }
    header { padding: 0 1rem; }
    main { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">MOVIE<span>STREAM</span></div>
  <nav id="nav">
    <button onclick="showPage('movies')" class="active" data-page="movies">Películas</button>
    <button onclick="showPage('interactions')" data-page="interactions">Interacciones</button>
  </nav>
  <div class="db-badge" id="db-badge">● conectando…</div>
</header>

<main id="main">
  <div class="empty"><div class="spinner"></div></div>
</main>

<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ── API CLIENT ────────────────────────────────────────────────
const API = {
  async get(path) {
    const r = await fetch('/api' + path);
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(path, body) {
    const r = await fetch('/api' + path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async put(path, body) {
    const r = await fetch('/api' + path, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async del(path) {
    const r = await fetch('/api' + path, { method: 'DELETE' });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }
};

// ── STATE ─────────────────────────────────────────────────────
let currentPage = 'movies';
let movieSearch = '';
let movieGenre = '';
let intFilter = '';
let intUserFilter = '';
let cachedUsers = [];
let cachedMovies = [];

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  try {
    const stats = await API.get('/stats');
    document.getElementById('db-badge').textContent = '● MongoDB';
    document.getElementById('db-badge').className = 'db-badge';
    showPage('movies');
  } catch(e) {
    document.getElementById('db-badge').textContent = '● sin conexión';
    document.getElementById('db-badge').className = 'db-badge error';
    document.getElementById('main').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>No se pudo conectar al servidor.<br>Verifica que el backend esté corriendo.</p></div>`;
  }
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  if (page === 'movies') renderMovies();
  else renderInteractions();
}

// ── MOVIES ────────────────────────────────────────────────────
async function renderMovies() {
  document.getElementById('main').innerHTML = `<div class="empty"><div class="spinner"></div></div>`;
  try {
    const params = new URLSearchParams();
    if (movieSearch) params.set('search', movieSearch);
    if (movieGenre) params.set('genre', movieGenre);

    const [movies, genres, stats] = await Promise.all([
      API.get('/movies?' + params),
      API.get('/movies/genres'),
      API.get('/stats')
    ]);
    cachedMovies = movies;

    const genreOptions = genres.map(g => `<option value="${g}" ${movieGenre===g?'selected':''}>${g}</option>`).join('');

    document.getElementById('main').innerHTML = `
      <div class="page-header">
        <div class="page-title"><span>COLECCIÓN</span>Películas</div>
      </div>
      <div class="stats-bar">
        <div class="stat"><div class="stat-value">${stats.movies}</div><div class="stat-label">Películas</div></div>
        <div class="stat"><div class="stat-value">${stats.genres}</div><div class="stat-label">Géneros</div></div>
        <div class="stat"><div class="stat-value">${stats.interactions}</div><div class="stat-label">Interacciones</div></div>
        <div class="stat"><div class="stat-value">${stats.users}</div><div class="stat-label">Usuarios</div></div>
      </div>
      <div class="controls">
        <input class="search-box" type="text" placeholder="Buscar película o descripción…" value="${movieSearch}" oninput="movieSearch=this.value; renderMovies()">
        <select class="filter-select" onchange="movieGenre=this.value; renderMovies()">
          <option value="">Todos los géneros</option>
          ${genreOptions}
        </select>
        <button class="btn btn-primary" onclick="openMovieForm()">+ Nueva película</button>
      </div>
      ${movies.length === 0
        ? `<div class="empty"><div class="empty-icon">🎬</div><p>No se encontraron películas</p></div>`
        : `<div class="grid">${movies.map(movieCard).join('')}</div>`}`;
  } catch(e) {
    toast(e.message, true);
  }
}

function movieCard(m) {
  const genres = (m.genres||[]).map(g=>`<span class="tag genre">${g}</span>`).join('');
  const cast = (m.cast||[]).slice(0,3).map(c=>`<div><span>${c.name}</span> — ${c.role}</div>`).join('');
  return `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${m.title}</div>
        <div class="card-year">${m.year||'—'}</div>
      </div>
      <div class="tags">${genres}</div>
      <div class="card-meta">
        <div>${m.main_subject||''}</div>
        ${m.duration_min?`<div><strong>${m.duration_min}</strong> min${m.awards?` · <strong>${m.awards}</strong> premios`:''}` :''}
      </div>
      ${cast?`<div class="cast-list">${cast}</div>`:''}
      <div class="card-actions">
        <button class="btn btn-edit btn-sm" onclick="openMovieForm('${m._id}')">✎ Editar</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete('movie','${m._id}','${m.title.replace(/'/g,"\\'")}')">✕ Borrar</button>
      </div>
    </div>`;
}

function openMovieForm(id) {
  const m = id ? cachedMovies.find(x => x._id === id) : null;
  const genresVal = m ? (m.genres||[]).join(', ') : '';
  const castVal = m ? (m.cast||[]).map(c=>`${c.name}:${c.role}`).join('\n') : '';
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">${m ? 'Editar película' : 'Nueva película'}</div>
    <div class="form-grid">
      <div class="form-group full"><label>Título</label><input id="f-title" value="${m?.title||''}" placeholder="The Matrix"></div>
      <div class="form-group"><label>Año</label><input id="f-year" type="number" value="${m?.year||''}" placeholder="1999"></div>
      <div class="form-group"><label>Duración (min)</label><input id="f-dur" type="number" value="${m?.duration_min||''}" placeholder="136"></div>
      <div class="form-group full"><label>Géneros</label><input id="f-genres" value="${genresVal}" placeholder="Sci-Fi, Action"><span class="form-hint">Separados por coma</span></div>
      <div class="form-group"><label>Premios</label><input id="f-awards" type="number" value="${m?.awards||''}" placeholder="4"></div>
      <div class="form-group full"><label>Descripción</label><input id="f-subject" value="${m?.main_subject||''}" placeholder="De qué trata"></div>
      <div class="form-group full"><label>Reparto (Nombre:Rol, uno por línea)</label><textarea id="f-cast" placeholder="Keanu Reeves:Neo\nLaurence Fishburne:Morpheus">${castVal}</textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveMovie(${id?`'${id}'`:'null'})">
        ${m ? 'Guardar cambios' : 'Crear película'}
      </button>
    </div>`;
  document.getElementById('modal-overlay').style.display = 'flex';
}

async function saveMovie(id) {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('El título es obligatorio', true); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const doc = {
    title,
    year: parseInt(document.getElementById('f-year').value)||null,
    duration_min: parseInt(document.getElementById('f-dur').value)||null,
    awards: parseInt(document.getElementById('f-awards').value)||null,
    main_subject: document.getElementById('f-subject').value.trim(),
    genres: document.getElementById('f-genres').value.split(',').map(g=>g.trim()).filter(Boolean),
    cast: document.getElementById('f-cast').value.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
      const [name,...rest] = l.split(':');
      return { name: name.trim(), role: rest.join(':').trim() };
    })
  };
  try {
    if (id) { await API.put('/movies/'+id, doc); toast('Película actualizada ✓'); }
    else { await API.post('/movies', doc); toast('Película creada ✓'); }
    closeModal();
    renderMovies();
  } catch(e) { toast(e.message, true); btn.disabled = false; btn.textContent = 'Reintentar'; }
}

// ── INTERACTIONS ──────────────────────────────────────────────
async function renderInteractions() {
  document.getElementById('main').innerHTML = `<div class="empty"><div class="spinner"></div></div>`;
  try {
    const params = new URLSearchParams();
    if (intFilter) params.set('type', intFilter);
    if (intUserFilter) params.set('userId', intUserFilter);

    const [interactions, users] = await Promise.all([
      API.get('/interactions?' + params),
      API.get('/users')
    ]);
    cachedUsers = users;

    const userFilterOptions = users.map(u=>`<option value="${u._id}" ${intUserFilter===u._id?'selected':''}>${u.username}</option>`).join('');

    document.getElementById('main').innerHTML = `
      <div class="page-header">
        <div class="page-title"><span>COLECCIÓN</span>Interacciones</div>
      </div>
      <div class="controls">
        <select class="filter-select" onchange="intFilter=this.value; renderInteractions()">
          <option value="">Todos los tipos</option>
          <option value="view" ${intFilter==='view'?'selected':''}>Vistas</option>
          <option value="rating" ${intFilter==='rating'?'selected':''}>Ratings</option>
        </select>
        <select class="filter-select" onchange="intUserFilter=this.value; renderInteractions()">
          <option value="">Todos los usuarios</option>
          ${userFilterOptions}
        </select>
        <button class="btn btn-primary" onclick="openInteractionForm(null)">+ Nueva interacción</button>
      </div>
      ${interactions.length === 0
        ? `<div class="empty"><div class="empty-icon">⭐</div><p>No hay interacciones</p></div>`
        : `<div class="interactions-list">${interactions.map(interactionCard).join('')}</div>`}`;
  } catch(e) { toast(e.message, true); }
}

function interactionCard(i) {
  const typeCls = i.type==='rating' ? 'type-rating' : 'type-view';
  const rating = i.type==='rating' && i.rating
    ? `<span class="rating-badge">★ ${i.rating}</span>`
    : `<span style="color:var(--text-dim);font-family:var(--mono);font-size:0.65rem">${i.completed?'✓ completa':'∙ parcial'}</span>`;
  const date = i.watched_at ? new Date(i.watched_at).toLocaleDateString('es-MX') : '—';
  return `
    <div class="interaction-card">
      <span class="interaction-type ${typeCls}">${i.type==='rating'?'rating':'vista'}</span>
      <div class="interaction-info">
        <div class="interaction-movie">${i.movieTitle}</div>
        <div class="interaction-user">@${i.username}</div>
      </div>
      <div>${rating}</div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem">
        <div class="interaction-date">${date}</div>
        <div style="display:flex;gap:0.3rem">
          <button class="btn btn-edit btn-sm" onclick='openInteractionForm("${i._id}")'>✎</button>
          <button class="btn btn-danger btn-sm" onclick="deleteInteraction('${i._id}')">✕</button>
        </div>
      </div>
    </div>`;
}

async function openInteractionForm(id) {
  const [movies, users] = await Promise.all([API.get('/movies'), API.get('/users')]);
  cachedMovies = movies;
  cachedUsers = users;

  let item = null;
  if (id) {
    const all = await API.get('/interactions');
    item = all.find(i => i._id === id);
  }

  const mOpts = movies.map(m=>`<option value="${m._id}" ${item?.movieId===m._id?'selected':''}>${m.title}</option>`).join('');
  const uOpts = users.map(u=>`<option value="${u._id}" ${item?.userId===u._id?'selected':''}>${u.username}</option>`).join('');

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">${item ? 'Editar interacción' : 'Nueva interacción'}</div>
    <div class="form-grid">
      <div class="form-group full"><label>Película</label>
        <select id="f-movie"><option value="">— Selecciona —</option>${mOpts}</select></div>
      <div class="form-group full"><label>Usuario</label>
        <select id="f-user"><option value="">— Selecciona —</option>${uOpts}</select></div>
      <div class="form-group"><label>Tipo</label>
        <select id="f-type" onchange="toggleRating()">
          <option value="view" ${item?.type==='view'?'selected':''}>Vista</option>
          <option value="rating" ${item?.type==='rating'?'selected':''}>Rating</option>
        </select></div>
      <div class="form-group" id="rating-group" style="${item?.type==='rating'?'':'display:none'}">
        <label>Calificación (1–5)</label>
        <input id="f-rating" type="number" min="1" max="5" step="0.5" value="${item?.rating||''}"></div>
      <div class="form-group"><label>¿Completó la película?</label>
        <select id="f-completed">
          <option value="true" ${item?.completed?'selected':''}>Sí</option>
          <option value="false" ${!item?.completed?'selected':''}>No</option>
        </select></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="save-int-btn" onclick="saveInteraction(${id?`'${id}'`:'null'})">
        ${item ? 'Guardar' : 'Registrar'}
      </button>
    </div>`;
  document.getElementById('modal-overlay').style.display = 'flex';
  if (item) {
    document.getElementById('f-movie').value = item.movieId;
    document.getElementById('f-user').value = item.userId;
  }
}

function toggleRating() {
  document.getElementById('rating-group').style.display =
    document.getElementById('f-type').value === 'rating' ? '' : 'none';
}

async function saveInteraction(id) {
  const movieId = document.getElementById('f-movie').value;
  const userId = document.getElementById('f-user').value;
  if (!movieId || !userId) { toast('Selecciona película y usuario', true); return; }
  const btn = document.getElementById('save-int-btn');
  btn.disabled = true;
  const type = document.getElementById('f-type').value;
  const doc = { movieId, userId, type, rating: type==='rating' ? parseFloat(document.getElementById('f-rating').value)||null : null, completed: document.getElementById('f-completed').value === 'true' };
  try {
    if (id) { await API.put('/interactions/'+id, doc); toast('Interacción actualizada ✓'); }
    else { await API.post('/interactions', doc); toast('Interacción registrada ✓'); }
    closeModal(); renderInteractions();
  } catch(e) { toast(e.message, true); btn.disabled = false; }
}

async function deleteInteraction(id) {
  await API.del('/interactions/'+id);
  toast('Eliminada');
  renderInteractions();
}

// ── DELETE ────────────────────────────────────────────────────
function confirmDelete(type, id, name) {
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">Confirmar eliminación</div>
    <p style="font-family:var(--mono);font-size:0.8rem;color:var(--text-dim);margin-bottom:1.5rem">
      ¿Eliminar <strong style="color:var(--text)">"${name}"</strong>?<br>
      <span style="color:var(--danger);font-size:0.7rem">También se eliminarán sus interacciones asociadas.</span>
    </p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" onclick="doDelete('${type}','${id}')">Eliminar</button>
    </div>`;
  document.getElementById('modal-overlay').style.display = 'flex';
}

async function doDelete(type, id) {
  if (type==='movie') { await API.del('/movies/'+id); toast('Película eliminada'); renderMovies(); }
  closeModal();
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').style.display = 'none';
}

function toast(msg, error=false) {
  const el = document.createElement('div');
  el.className = 'toast'+(error?' error':'');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

init();
</script>
</body>
</html>
